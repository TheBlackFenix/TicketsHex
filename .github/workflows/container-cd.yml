name: Container CI/CD

on:
  push:
    branches:
      - Util_Prod
  pull_request:
    branches:
      - Util_Prod
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: container-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Test
        run: dotnet test TicketsHex.sln --configuration Release

  publish:
    if: github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.repository.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image name
        id: repository
        shell: bash
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.repository.outputs.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long

      - name: Build and publish image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: TicketsHex.API/Dockerfile
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy-railway:
    if: github.ref == 'refs/heads/Util_Prod' && vars.RAILWAY_DEPLOY_ENABLED == 'true'
    needs: publish
    runs-on: ubuntu-latest
    environment: production
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_SERVICE: ${{ vars.RAILWAY_SERVICE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Railway CLI
        run: npm install --global @railway/cli

      - name: Deploy to Railway
        run: railway up --ci --service "$RAILWAY_SERVICE"
